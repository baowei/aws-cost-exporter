apiVersion: v1
kind: ConfigMap
metadata:
  name: aws-cost-exporter-config
data:
  exporter_config.yaml: |
    exporter_port: $EXPORTER_PORT|9090 # the port that exposes cost metrics
    polling_interval_seconds: $POLLING_INTERVAL_SECONDS|28800 # by default it is 8 hours because for daily cost, AWS only updates the data once per day

    aws_access_key: $AWS_ACCESS_KEY|"" # for prod deployment, DO NOT put the actual value here or default is null ("") to use iam-role/irsa
    aws_access_secret: $AWS_ACCESS_SECRET|"" # for prod deployment, DO NOT put the actual value here or default is set null ("") to use iam-role/irsa
    aws_assumed_role_name: CostExporterRole

    metrics:
      - metric_name: aws_daily_cost_usd # change the metric name if needed
        group_by:
          enabled: true
          groups:
            - type: DIMENSION
              key: SERVICE
              label_name: ServiceName
            - type: DIMENSION
              key: REGION
              label_name: RegionName
          merge_minor_cost:
            enabled: false
            threshold: 10
            tag_value: other
        metric_type: AmortizedCost

      - metric_name: aws_daily_cost_usd_by_tag_project_service # change the metric name if needed
        group_by:
          enabled: true
          groups:
            - type: TAG
              key: cost_project
              label_name: TagByProject
            - type: TAG
              key: cost_service
              label_name: TagByService
          merge_minor_cost:
            enabled: false
            threshold: 10
            tag_value: other
        metric_type: AmortizedCost

      - metric_name: aws_daily_cost_usd_by_tag_region_project # change the metric name if needed
        group_by:
          enabled: true
          groups:
            - type: DIMENSION
              key: REGION
              label_name: RegionName
            - type: TAG
              key: cost_project
              label_name: TagByProject
          merge_minor_cost:
            enabled: false
            threshold: 10
            tag_value: other
        metric_type: AmortizedCost

    target_aws_accounts:
      - Publisher: 711891019284
        ProjectName: cta-staging
        EnvironmentName: dev
      - Publisher: 618443055614
        ProjectName: transfer-prod
        EnvironmentName: prod
      - Publisher: 733691812639
        ProjectName: prop-prod
        EnvironmentName: prod
